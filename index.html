<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PokeCryptic - Random Mode</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1 id="clue-date">Random Puzzle</h1>
  </header>

  <main>
    <!-- Clue Card -->
    <section id="clue-section" class="card">
      <p id="clue-text">Loading clue...</p>
    </section>

    <!-- Solve Card -->
    <section id="solve-section" class="card">
      <div id="input-grid"></div>
    </section>

    <!-- Counter Card -->
    <section id="counter-section" class="card">
      <div class="hint-bar-wrap">
        <div class="hint-dots is-high" id="hint-dots"></div>
        <div class="par-label">
          <span class="par-text">Par</span>
          <span id="par-value" class="par-value">0</span>
        </div>
      </div>
    </section>

    <!-- Button Card -->
    <section id="button-section" class="card">
      <div class="button-row">
        <button id="hint-btn">Hints</button>
        <button id="check-btn" disabled>Check</button>
      </div>
      <div class="button-row">
        <button id="prev-btn" class="nav-btn">← Prev</button>
        <button id="random-btn" class="nav-btn">Random</button>
        <button id="next-btn" class="nav-btn">Next →</button>
      </div>
      <div class="button-row">
        <button id="reset-progress" class="reset-btn">Reset Current</button>
      </div>
    </section>

    <!-- Solved Card (hidden until solved) -->
    <section id="solved-section" class="card" style="display: none;">
      <div class="hint-bar-wrap">
        <div id="solved-hint-dots" class="hint-dots is-high"></div>
      </div>
      <h3 id="solved-title">Gotcha!</h3>
      <p id="solved-timer">Puzzle solved!</p>
    </section>

    <!-- Stats Card (hidden until solved) -->
    <section id="stats-section" class="card" style="display: none;">
      <div class="stat-row">
        <span class="stat-label">Solved by</span>
        <span class="stat-value" id="stats-solved">0 trainers</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Par</span>
        <span class="stat-value" id="stats-par">0 hints</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">You used</span>
        <span class="stat-value" id="stats-hints">0 hints</span>
      </div>
    </section>

    <!-- Video Card (hidden until solved) -->
    <section id="end-section" class="card" style="display: none;">
      <h3 class="end-title">See how it works</h3>
      <div class="end-row">
        <a id="end-yt-link" class="yt-embed-link" target="_blank" rel="noopener noreferrer" href="#" style="display: none;">
          <div id="end-yt-thumb" class="yt-embed-thumb">
            <div class="yt-play-button"></div>
          </div>
        </a>
      </div>
      <h3 class="end-title">Check out the hints</h3>
      <div class="end-row">
        <h4>Indicators</h4>
        <p id="end-ind"></p>
      </div>
      <div class="end-row">
        <h4>Fodder</h4>
        <p id="end-fod"></p>
      </div>
      <div class="end-row">
        <h4>Definition</h4>
        <p id="end-def"></p>
      </div>
    </section>
  </main>

  <!-- Hint Modal -->
  <div id="hint-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-btn">×</span>
      <h3>Reveal</h3>
      <ul>
        <li><button class="hint-option hint-indicators">Indicators</button></li>
        <li><button class="hint-option hint-fodder">Fodder</button></li>
        <li><button class="hint-option hint-definition">Definition</button></li>
        <li><button class="hint-option hint-letter">Letter</button></li>
      </ul>
    </div>
  </div>

  <!-- Hint Toast -->
  <div id="hint-toast" class="toast hidden">
    <div class="toast-content">
      <button class="toast-close">×</button>
      <p id="toast-text"></p>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
